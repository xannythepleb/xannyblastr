<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xannyblastr</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-2: #111118;
      --card: #16161f;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ededf2;
      --muted: #9a9aa8;
      --accent: #a78bfa;
      --accent-soft: rgba(167, 139, 250, 0.14);
      --ok: #4ade80;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(167, 139, 250, 0.10), transparent 60%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 34px 32px 26px;
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.6);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6);
      animation: pulse 2.4s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
      70% { box-shadow: 0 0 0 7px rgba(74, 222, 128, 0); }
      100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
    }
    h1 {
      margin: 0 0 6px;
      font-size: 27px;
      font-weight: 650;
      letter-spacing: -0.01em;
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(167, 139, 250, 0.25);
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    p.desc {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 8px;
    }
    .url {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 22px;
      word-break: break-all;
    }
    .copy {
      flex: none;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 7px;
      transition: color .15s, border-color .15s;
    }
    .copy:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 26px; }
    .chip {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 9px;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .gh {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 9px;
      transition: background .15s, border-color .15s;
    }
    .gh:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.2); }
    .gh svg { width: 17px; height: 17px; fill: currentColor; }
    .meta { font-size: 12px; color: var(--muted); }
    .meta a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="status"><span class="dot"></span><span>Online</span></div>

    <h1 id="name">xannyblastr</h1>
    <span class="tag">Encrypted DM only WoT relay</span>
    <p class="desc" id="description">
      A private Nostr relay that accepts gift wrapped direct messages and relays them on.
      This page is for humans &mdash; point a Nostr client at the address below to connect.
    </p>

    <p class="label">Relay address</p>
    <div class="url">
      <span id="wss">wss://&hellip;</span>
      <button class="copy" id="copy" type="button">Copy</button>
    </div>

    <p class="label">Supported NIPs</p>
    <div class="chips" id="nips">
      <span class="chip">01</span>
      <span class="chip">11</span>
      <span class="chip">17</span>
      <span class="chip">42</span>
      <span class="chip">59</span>
    </div>

    <div class="footer">
      <!-- TODO: replace the href below with your project's GitHub URL -->
      <a class="gh" id="github" href="https://github.com/xannythepleb/xannyblastr" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
        <span>GitHub</span>
      </a>
      <span class="meta">Powered by <span id="software">xannyblastr</span></span>
    </div>
  </main>

  <script>
    // Show the wss:// connection address derived from the current origin.
    const wss = location.origin.replace(/^http/, 'ws');

    document.getElementById('wss').textContent = wss;

    document.getElementById('copy').addEventListener('click', async (e) => {
      try {
        await navigator.clipboard.writeText(wss);
        e.target.textContent = 'Copied';
        setTimeout(() => {
          e.target.textContent = 'Copy';
        }, 1400);
      } catch {
        // Keep the button unchanged if clipboard access is unavailable.
      }
    });

    // Populate name / description / NIPs from the relay's own NIP-11 document.
    fetch(location.pathname, { headers: { Accept: 'application/nostr+json' } })
      .then((r) => r.json())
      .then((info) => {
        if (info.name) {
          document.getElementById('name').textContent = info.name;
          document.title = info.name;
        }

        if (info.description) {
          document.getElementById('description').textContent = info.description;
        }

        if (Array.isArray(info.supported_nips)) {
          const nips = document.getElementById('nips');

          nips.replaceChildren(
            ...info.supported_nips.map((n) => {
              const chip = document.createElement('span');
              chip.className = 'chip';
              chip.textContent = String(n).padStart(2, '0');
              return chip;
            })
          );
        }

        if (info.software || info.version) {
          const softwareName = info.software
            ? info.software.split('/').pop()
            : 'xannyblastr';

          const label = softwareName + (info.version ? ' v' + info.version : '');
          document.getElementById('software').textContent = label;
        }
      })
      .catch(() => {
        // Keep the static fallback content.
      });
  </script>
</body>
</html>
